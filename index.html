<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định Giá Tiền Số Đẹp v4.2 Ultimate - Duy Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #050505; color: #fff; min-height: 100vh; }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid #333; }
        .input-style { background: #111; border: 1px solid #444; transition: 0.3s; color: white; }
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); outline: none; }
        .glow-button { background: linear-gradient(45deg, #2563eb, #7c3aed); transition: 0.5s; cursor: pointer; }
        .glow-button:hover { box-shadow: 0 0 20px rgba(124, 58, 237, 0.6); transform: translateY(-2px); }
        .tab-btn { padding: 0.7rem 1.5rem; color: #666; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .notification { position: fixed; top: 20px; right: 20px; background: #3b82f6; color: white; padding: 1rem; border-radius: 8px; z-index: 100; display: none; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div id="notification" class="notification"></div>

    <div class="glass-card max-w-5xl w-full p-6 md:p-10 rounded-[2.5rem]">
        <div class="mb-8">
            <h1 class="text-3xl font-bold uppercase tracking-tighter">Valuator <span class="text-blue-500">v4.2 Ultimate</span></h1>
            <p class="text-gray-500 text-xs">Hệ thống nhận diện Ngày sinh, Sảnh tiến & Số độc - Duy Collector</p>
        </div>

        <div class="flex border-b border-white/10 mb-6 overflow-x-auto">
            <button class="tab-btn active" onclick="openTab(event, 'main')">💎 Thẩm Định</button>
            <button class="tab-btn" onclick="openTab(event, 'stats')">📊 Kho Lưu Trữ</button>
        </div>

        <div id="main" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Mệnh giá & Seri</label>
                        <div class="flex gap-2">
                            <select id="deno" class="input-style p-3 rounded-xl w-32">
                                <option value="1000">1k</option>
                                <option value="10000">10k</option>
                                <option value="50000">50k</option>
                                <option value="100000">100k</option>
                                <option value="200000">200k</option>
                                <option value="500000" selected>500k</option>
                            </select>
                            <input type="text" id="serial" placeholder="88888888" maxlength="8" class="input-style p-3 rounded-xl flex-1 text-center font-bold tracking-[0.2em] text-blue-400">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Độ mới (Grade)</label>
                        <select id="cond" class="input-style p-3 rounded-xl w-full">
                            <option value="1.0">UNC (100% - Mới cứng)</option>
                            <option value="0.7">AUNC (70% - Cũ nhẹ)</option>
                            <option value="0.3">Used (30% - Nát)</option>
                        </select>
                    </div>

                    <button onclick="analyze()" class="glow-button w-full p-4 rounded-2xl font-bold uppercase">Bắt đầu định giá</button>
                </div>

                <div id="resultBox" class="bg-black/40 border border-white/5 rounded-3xl p-8 flex flex-col justify-center items-center text-center">
                    <div id="idle">
                        <p class="text-gray-600 italic">Đang chờ nhập dữ liệu...</p>
                    </div>
                    <div id="active" class="hidden space-y-4">
                        <div id="rankBadge" class="bg-blue-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase inline-block">Common</div>
                        <h2 class="text-5xl font-bold" id="resPrice">0đ</h2>
                        <div class="space-y-1">
                            <p class="text-blue-400 font-bold" id="resType">--</p>
                            <p class="text-xs text-gray-500" id="resNote">--</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="stats" class="tab-content">
            <div class="h-64 mb-6">
                <canvas id="myChart"></canvas>
            </div>
            <div id="history" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        function openTab(evt, name) {
            let content = document.getElementsByClassName("tab-content");
            for (let i = 0; i < content.length; i++) content[i].classList.remove("active");
            let btns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(name).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(name === 'stats') updateChart();
        }

        let historyData = [];

        function analyze() {
            const deno = parseInt(document.getElementById('deno').value);
            const s = document.getElementById('serial').value;
            const cond = parseFloat(document.getElementById('cond').value);

            if (s.length !== 8 || isNaN(s)) {
                alert("Seri phải có đúng 8 con số!");
                return;
            }

            let mult = 1;
            let type = "Số thường";
            let note = "Tờ tiền phổ thông, giá trị lưu thông.";

            // --- HỆ THỐNG NHẬN DIỆN MỚI ---

            // 1. Check Bát Quý (Vua)
            if (/^(\d)\1{7}$/.test(s)) {
                mult = 500; type = "Bát Quý"; note = "Siêu hiếm, biểu tượng của sự may mắn tuyệt đối.";
            } 
            // 2. Check Sảnh Rồng (Tiến từ 0-7 hoặc 1-8 hoặc 2-9)
            else if ("0123456789".includes(s) || "9876543210".includes(s)) {
                mult = 200; type = "Sảnh Rồng"; note = "Sảnh tiến/lùi dài nhất, cực kỳ giá trị.";
            }
            // 3. Check Ngày Sinh (Dạng ddmmyyyy)
            else if (isValidDate(s)) {
                mult = 15; type = "Full Birthday Note"; note = "Trùng khớp hoàn toàn một ngày lịch sử.";
            }
            // 4. Check Ngày Sinh Rút Gọn (xxxx2005, xxxx199x)
            else if (parseInt(s.slice(4)) >= 1950 && parseInt(s.slice(4)) <= 2026) {
                mult = 3; type = "Năm Sinh"; note = "Rất ý nghĩa làm quà tặng kỷ niệm.";
            }
            // 5. Check Số Gánh/Soi gương (Palindrome: 12344321)
            else if (s === s.split('').reverse().join('')) {
                mult = 10; type = "Số Soi Gương"; note = "Sự đối xứng hoàn hảo về mặt hình học.";
            }
            // 6. Check Sảnh đuôi (xxxx5678)
            else if ("0123456789".includes(s.slice(4))) {
                mult = 5; type = "Sảnh Đuôi 4"; note = "Bốn số cuối thăng tiến liên tục.";
            }
            // 7. Check Tứ Quý Đuôi
            else if (/(\d)\1{3}$/.test(s)) {
                mult = 8; type = "Tứ Quý Đuôi"; note = "Bốn số cuối giống nhau, rất dễ bán.";
            }
            // 8. Tài lộc (68, 86)
            else if (/(68|86)$/.test(s)) {
                mult = 1.5; type = "Lộc Phát"; note = "Mang ý nghĩa phong thủy tốt.";
            }

            const finalPrice = mult === 1 ? deno : deno + (deno * mult * cond);

            // Hiển thị
            document.getElementById('idle').classList.add('hidden');
            document.getElementById('active').classList.remove('hidden');
            document.getElementById('resPrice').innerText = Math.round(finalPrice).toLocaleString() + "đ";
            document.getElementById('resType').innerText = type;
            document.getElementById('resNote').innerText = note;
            document.getElementById('rankBadge').innerText = mult > 1 ? "Collectible" : "Common";
            document.getElementById('rankBadge').className = mult > 10 ? "bg-yellow-500 text-[10px] px-3 py-1 rounded-full font-bold uppercase" : "bg-blue-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase";

            // Lưu lịch sử
            historyData.unshift({ s, type, price: finalPrice });
            updateHistoryList();
        }

        function isValidDate(s) {
            const d = parseInt(s.slice(0, 2));
            const m = parseInt(s.slice(2, 4));
            const y = parseInt(s.slice(4));
            if (m < 1 || m > 12 || d < 1 || d > 31 || y < 1900 || y > 2026) return false;
            const date = new Date(y, m - 1, d);
            return date.getFullYear() === y && date.getMonth() === m - 1 && date.getDate() === d;
        }

        function updateHistoryList() {
            const h = document.getElementById('history');
            h.innerHTML = historyData.slice(0, 5).map(item => `
                <div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5 text-xs">
                    <span>${item.s} <span class="text-gray-500">(${item.type})</span></span>
                    <span class="text-green-400 font-bold">${Math.round(item.price).toLocaleString()}đ</span>
                </div>
            `).join('');
        }

        let chart;
        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData.map((_, i) => i + 1).reverse(),
                    datasets: [{
                        label: 'Giá trị thẩm định (đ)',
                        data: historyData.map(i => i.price).reverse(),
                        borderColor: '#3b82f6',
                        tension: 0.4
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
